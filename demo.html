<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sphere Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
        }

        #sphere-viewer-container {
            width: 100vw;
            height: 100vh;
        }

        #session-input {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10000;
            display: flex;
            gap: 8px;
            background: rgba(40, 40, 40, 0.9);
            padding: 8px 12px;
            border-radius: 6px;
        }

        #session-input input {
            padding: 6px 10px;
            background: #1a1a1a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            font-family: monospace;
            font-size: 13px;
            width: 400px;
        }

        #session-input button {
            padding: 6px 12px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        #session-input button:hover {
            background: #0056b3;
        }

        /* Hide Animation Controls heading */
        h3 {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="session-input">
        <input type="text" id="sessionIdInput" placeholder="Enter session ID">
        <button onclick="loadSession()">Load</button>
    </div>

    <div id="sphere-viewer-container"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="dist/sphere-viewer.js"></script>

    <script>
        let viewer = null;

        function loadSession() {
            const sessionId = document.getElementById('sessionIdInput').value.trim();
            if (!sessionId) return;

            const url = new URL(window.location);
            url.searchParams.set('session', sessionId);
            window.history.pushState({}, '', url);

            if (viewer) {
                viewer.destroy();
            }

            viewer = new window.FeatrixSphereViewer();
            viewer.init({
                data: {
                    session: {
                        session_id: sessionId
                    }
                },
                containerId: 'sphere-viewer-container'
            });
        }

        // Load from URL on page load
        const urlParams = new URLSearchParams(window.location.search);
        const sessionFromURL = urlParams.get('session');
        if (sessionFromURL) {
            document.getElementById('sessionIdInput').value = sessionFromURL;
            loadSession();
        }
    </script>
</body>
</html>
